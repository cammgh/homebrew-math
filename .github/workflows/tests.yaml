name: brew test-bot
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew Framework
        uses: Homebrew/actions/setup-homebrew@main

      - name: Execute Brew Test Bot
        run: |
          # 1. Force Homebrew to evaluate all formulas locally
          export HOMEBREW_EVAL_ALL=1

          # 2. Inform Homebrew that your current directory is your custom tap
          # This hooks the directory into Homebrew's internal naming tree
          brew tap-new cammgh/math --template=stub
          rm -f /opt/homebrew/Library/Taps/cammgh/homebrew-math/Formula/*
          cp Formula/gcl.rb /opt/homebrew/Library/Taps/cammgh/homebrew-math/Formula/

          # 3. Run the linter against the explicitly qualified tap name
          # This tells Homebrew to skip strict homebrew/core-only validation rules
          brew audit cammgh/math/gcl --online

          # 4. Force compile directly from your local source formula
          brew install --build-from-source /opt/homebrew/Library/Taps/cammgh/homebrew-math/Formula/gcl.rb

          # 5. Trigger the formula's internal test block post-installation
          brew test cammgh/math/gcl

      - name: Open Debug SSH Session on Failure
        # This hook opens only if the previous compilation block failed
        if: failure()
        uses: mxschmitt/action-tmate@v3

