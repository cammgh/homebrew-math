name: brew test-bot
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew Framework
        uses: Homebrew/actions/setup-homebrew@main

      - name: Execute Brew Test Bot
        run: |
          # 1. Force Homebrew to evaluate all formulas locally
          export HOMEBREW_EVAL_ALL=1

          # 2. Run Homebrew's internal code quality linter on your file
          brew audit --formula Formula/gcl.rb --online --new-formula

          # 3. Force compile directly from your local source formula
          brew install --build-from-source Formula/gcl.rb

          # 4. Trigger the formula's internal test block post-installation
          brew test Formula/gcl.rb

      - name: Open Debug SSH Session on Failure
        # This hook opens only if the previous compilation block failed
        if: failure()
        uses: mxschmitt/action-tmate@v3

