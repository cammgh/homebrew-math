name: Dynamic Tap Validation

on:
  push:
    branches:
      - main
      - maxima
      - acl2
      - fricas
      - axiom
      - hol88
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15
            arch: x86_64

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew Framework
        uses: Homebrew/actions/setup-homebrew@main

      # --- LAYER 1: MAIN BRANCH LOGIC (COMPILE & EXPORT GCL) ---
      - name: Build and Store Core GCL
        if: github.ref_name == 'main'
        run: |
          brew audit --formula "cammgh/math/gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-bottle "cammgh/math/gcl"
          brew test "cammgh/math/gcl"

          # Pack the compiled binary into a portable local Homebrew tarball archive (.bottle)
          brew bottle --root-url=https://localhost "cammgh/math/gcl"

      - name: Upload GCL Binary Package
        if: github.ref_name == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: gcl-binary-${{ matrix.os }}-${{ matrix.arch }}
          path: gcl-*.tar.gz

      # --- LAYER 2: DERIVATIVE BRANCHES LOGIC (DOWNLOAD GCL & COMPILE DERIVATIVES) ---
      - name: Download Precompiled GCL from Main Branch
        if: github.ref_name != 'main'
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          workflow: tests.yaml
          name: gcl-binary-${{ matrix.os }}-${{ matrix.arch }}
          workflow_conclusion: success
          path: ./
        continue-on-error: true # Falls back to source if no artifact exists yet

      - name: Install Local GCL Binary
        if: github.ref_name != 'main'
        run: |
          if ls gcl-*.bottle.tar.gz 1> /dev/null 2>&1; then
            echo "Installing pre-built bottle via direct extraction..."
            BOTTLE_FILE=$(ls gcl-*.bottle.tar.gz | head -n 1)

            # 1. Target the absolute Cellar storage root
            CELLAR_DIR=$(brew --cellar)
            mkdir -p "$CELLAR_DIR"

            # 2. Extract directly into the Cellar prefix root
            # Homebrew bottles are packed relative to the prefix root directory
            sudo tar -xzf "$BOTTLE_FILE" -C "$CELLAR_DIR"

            # 3. Force Homebrew to link the extracted binaries into bin/ and share/
            brew link --force gcl || brew link --overwrite gcl
          else
            echo "No artifact found! Falling back to source compilation..."
            brew install --formula --verbose --build-from-source "cammgh/math/gcl"
          fi

      - name: Build Maxima Stack
        if: github.ref_name == 'maxima'
        run: |
          brew audit --formula "cammgh/math/maxima-gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-from-source "cammgh/math/maxima-gcl"
          brew test "cammgh/math/maxima-gcl"

      - name: Build ACL2 Stack
        if: github.ref_name == 'acl2'
        run: |
          brew audit --formula "cammgh/math/acl2-gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-from-source "cammgh/math/acl2-gcl"
          brew test "cammgh/math/acl2-gcl"

      - name: Build FriCAS Stack
        if: github.ref_name == 'fricas'
        run: |
          brew audit --formula "cammgh/math/fricas-gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-from-source "cammgh/math/fricas-gcl"
          brew test "cammgh/math/fricas-gcl"

      - name: Build HOL88 Stack
        if: github.ref_name == 'hol88'
        run: |
          brew audit --formula "cammgh/math/hol88-gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-from-source "cammgh/math/hol88-gcl"
          brew test "cammgh/math/hol88-gcl"

      - name: Build AXIOM Stack
        if: github.ref_name == 'axiom'
        run: |
          brew audit --formula "cammgh/math/axiom-gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-from-source "cammgh/math/axiom-gcl"
          brew test "cammgh/math/axiom-gcl"

      # --- DEB_BUG TRACE ARCHIVE ---
      - name: Open Debug SSH Session on Failure
        if: failure()
        uses: mxschmitt/action-tmate@v3
