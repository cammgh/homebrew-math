    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew Framework
        uses: Homebrew/actions/setup-homebrew@main

      # --- LAYER 2: DERIVATIVE BRANCHES LOGIC (DOWNLOAD GCL27 & COMPILE DERIVATIVES) ---
      - name: Download Precompiled GCL27 from Main Branch
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          workflow: tests.yaml
          name: gcl27-binary-${{ matrix.os }}-${{ matrix.arch }}
          workflow_conclusion: success
          path: ./
        continue-on-error: true # Falls back to source if no artifact exists yet

      - name: Install Local GCL27 Binary
        run: |
          BOTTLE_FILE=$(ls -1 gcl27*z | head -n 1)
          [ "$BOTTLE_FILE" != "" ] || false
          BOTTLE_ARCH=$(echo "$BOTTLE_FILE" | grep -oE '(arm64_tahoe|tahoe)\.bottle' | cut -d'.' -f1)
          brew tap-new local/math
          TAP_DIR=$(brew --repository local/math)
          cp ./Formula/gcl27.rb "$TAP_DIR/Formula/gcl27.rb"
          BOTTLE_SHA=$(shasum -a 256 $BOTTLE_FILE | awk '{print $1}')
          cp $BOTTLE_FILE $TAP_DIR/$(echo $BOTTLE_FILE | sed 's,--,-,1')
          cd $TAP_DIR
          cp Formula/gcl27.rb Formula/gcl27.rb.old
          sed -i '' "s@root_url .*@root_url \"file://${TAP_DIR}\"@g" Formula/gcl27.rb
          sed -i '' "s/# sha256 cellar.*/sha256 cellar: :any, $BOTTLE_ARCH: \"${BOTTLE_SHA}\"/g" Formula/gcl27.rb
          brew install --formula $(pwd)/Formula/gcl27.rb

      - name: Download Core State Artifact
        uses: actions/download-artifact@v4
        with:
          name: acl2-core-state-${{ matrix.arch }}

      - name: Verify Book Regression Subset
        env:
          HOMEBREW_ACL2_BUILD: "books"
          HOMEBREW_ACL2_ICF: "${{github.workspace}}/acl2-core-${{ matrix.arch }}.tar.gz"
          HOMEBREW_ACL2_OCF: "acl2-books-${{ matrix.arch }}-1.tar.gz"
        run: |
          brew install --formula --verbose --build-from-source "cammgh/math/acl2-gcl"
          find $(brew --prefix) -name "acl2-books-${{ matrix.arch }}-1.tar.gz" -exec cp {} . \;

      - name: Upload Verified Books Artifact
        uses: actions/upload-artifact@v4
        with:
          name: acl2-books-state-${{ matrix.arch }}-1
          path: acl2-books-${{ matrix.arch }}-1.tar.gz

      # --- DEB_BUG TRACE ARCHIVE ---
      - name: Open Debug SSH Session on Failure
        if: failure()
        uses: owenthereal/action-upterm@v1
        with:
          # Explicitly force a raw bash process instead of tmux
          upterm-command: /bin/bash --noprofile --norc

  books1:
    needs: books
    if: github.ref_name == 'acl2'
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15
            arch: x86_64

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew Framework
        uses: Homebrew/actions/setup-homebrew@main

      # --- LAYER 2: DERIVATIVE BRANCHES LOGIC (DOWNLOAD GCL27 & COMPILE DERIVATIVES) ---
      - name: Download Precompiled GCL27 from Main Branch
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          workflow: tests.yaml
          name: gcl27-binary-${{ matrix.os }}-${{ matrix.arch }}
          workflow_conclusion: success
          path: ./
        continue-on-error: true # Falls back to source if no artifact exists yet

      - name: Install Local GCL27 Binary
        run: |
          BOTTLE_FILE=$(ls -1 gcl27*z | head -n 1)
          [ "$BOTTLE_FILE" != "" ] || false
          BOTTLE_ARCH=$(echo "$BOTTLE_FILE" | grep -oE '(arm64_tahoe|tahoe)\.bottle' | cut -d'.' -f1)
          brew tap-new local/math
          TAP_DIR=$(brew --repository local/math)
          cp ./Formula/gcl27.rb "$TAP_DIR/Formula/gcl27.rb"
          BOTTLE_SHA=$(shasum -a 256 $BOTTLE_FILE | awk '{print $1}')
          cp $BOTTLE_FILE $TAP_DIR/$(echo $BOTTLE_FILE | sed 's,--,-,1')
          cd $TAP_DIR
          cp Formula/gcl27.rb Formula/gcl27.rb.old
          sed -i '' "s@root_url .*@root_url \"file://${TAP_DIR}\"@g" Formula/gcl27.rb
          sed -i '' "s/# sha256 cellar.*/sha256 cellar: :any, $BOTTLE_ARCH: \"${BOTTLE_SHA}\"/g" Formula/gcl27.rb
          brew install --formula $(pwd)/Formula/gcl27.rb

      - name: Download Core State Artifact
        uses: actions/download-artifact@v4
        with:
          name: acl2-books-state-${{ matrix.arch }}-1

      - name: Verify Book Regression Subset
        env:
          HOMEBREW_ACL2_BUILD: "books"
          HOMEBREW_ACL2_ICF: "${{github.workspace}}/acl2-books-${{ matrix.arch }}-1.tar.gz"
          HOMEBREW_ACL2_OCF: "acl2-books-${{ matrix.arch }}-2.tar.gz"
        run: |
          brew install --formula --verbose --build-from-source "cammgh/math/acl2-gcl"
          find $(brew --prefix) -name "acl2-books-${{ matrix.arch }}-2.tar.gz" -exec cp {} . \;

      - name: Upload Verified Books Artifact
        uses: actions/upload-artifact@v4
        with:
          name: acl2-books-state-${{ matrix.arch }}-2
          path: acl2-books-${{ matrix.arch }}-2.tar.gz

      # --- DEB_BUG TRACE ARCHIVE ---
      - name: Open Debug SSH Session on Failure
        if: failure()
        uses: owenthereal/action-upterm@v1
        with:
          # Explicitly force a raw bash process instead of tmux
          upterm-command: /bin/bash --noprofile --norc

  books2:
    needs: books1
    if: github.ref_name == 'acl2'
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15
            arch: x86_64

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew Framework
        uses: Homebrew/actions/setup-homebrew@main

      # --- LAYER 2: DERIVATIVE BRANCHES LOGIC (DOWNLOAD GCL27 & COMPILE DERIVATIVES) ---
      - name: Download Precompiled GCL27 from Main Branch
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          workflow: tests.yaml
          name: gcl27-binary-${{ matrix.os }}-${{ matrix.arch }}
          workflow_conclusion: success
          path: ./
        continue-on-error: true # Falls back to source if no artifact exists yet

      - name: Install Local GCL27 Binary
        run: |
