name: brew test-bot
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-14
            arch: x86_64  # Captures Intel platform compilation behaviors

    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew Framework
        uses: Homebrew/actions/setup-homebrew@main

      - name: Execute Brew Test Bot
        run: |
          # 1. Force Homebrew to evaluate all formulas locally
          export HOMEBREW_EVAL_ALL=1

          # 2. Run the linter against the explicitly qualified tap name
          # This tells Homebrew to skip strict homebrew/core-only validation rules
          brew audit --formula cammgh/math/gcl --online

          # 3. Force compile directly from your local source formula
          brew install --formula --build-from-source cammgh/math/gcl

          # 4. Trigger the formula's internal test block post-installation
          brew test cammgh/math/gcl

      - name: Open Debug SSH Session on Failure
        # This hook opens only if the previous compilation block failed
        if: failure()
        uses: mxschmitt/action-tmate@v3

