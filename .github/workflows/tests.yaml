        with:
          name: acl2-books-state-${{ matrix.arch }}-2

      - name: Verify Book Regression Subset
        env:
          HOMEBREW_ACL2_BUILD: "books"
          HOMEBREW_ACL2_ICF: "${{github.workspace}}/acl2-books-${{ matrix.arch }}-2.tar.gz"
          HOMEBREW_ACL2_OCF: "acl2-books-${{ matrix.arch }}-3.tar.gz"
        run: |
          brew install --formula --verbose --build-from-source "cammgh/math/acl2-gcl"
          find $(brew --prefix) -name "acl2-books-${{ matrix.arch }}-3.tar.gz" -exec cp {} . \;

      - name: Upload Verified Books Artifact
        uses: actions/upload-artifact@v4
        with:
          name: acl2-books-state-${{ matrix.arch }}-3
          path: acl2-books-${{ matrix.arch }}-3.tar.gz

      # --- DEB_BUG TRACE ARCHIVE ---
      - name: Open Debug SSH Session on Failure
        if: failure()
        uses: owenthereal/action-upterm@v1
        with:
          # Explicitly force a raw bash process instead of tmux
          upterm-command: /bin/bash --noprofile --norc

  # Stage 3: Collect artifacts, combine, and execute final install
  finalize_install:
    needs: books2
    if: github.ref_name == 'acl2'
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15
            arch: x86_64

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew Framework
        uses: Homebrew/actions/setup-homebrew@main

      # --- LAYER 2: DERIVATIVE BRANCHES LOGIC (DOWNLOAD GCL27 & COMPILE DERIVATIVES) ---
      - name: Download Precompiled GCL27 from Main Branch
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          workflow: tests.yaml
