name: Dynamic Tap Validation

on:
  push:
    branches:
      - main
      - maxima
      - acl2
      - fricas
      - axiom
      - hol88
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15
            arch: x86_64

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew Framework
        uses: Homebrew/actions/setup-homebrew@main

      # --- LAYER 1: MAIN BRANCH LOGIC (COMPILE & EXPORT GCL27) ---
      - name: Build and Store Core GCL27
        if: github.ref_name == 'main'
        run: |
          brew audit --formula "cammgh/math/gcl27" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-bottle "cammgh/math/gcl27"
          brew test "cammgh/math/gcl27"

          # Pack the compiled binary into a portable local Homebrew tarball archive (.bottle)
          brew bottle --root-url=https://localhost "cammgh/math/gcl27"

      - name: Upload GCL27 Binary Package
        if: github.ref_name == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: gcl27-binary-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            gcl27-*.bottle.tar.gz
            gcl27-*.bottle.json

      # --- LAYER 2: DERIVATIVE BRANCHES LOGIC (DOWNLOAD GCL27 & COMPILE DERIVATIVES) ---
      - name: Download Precompiled GCL27 from Main Branch
        if: github.ref_name != 'main'
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          workflow: tests.yaml
          name: gcl27-binary-${{ matrix.os }}-${{ matrix.arch }}
          workflow_conclusion: success
          path: ./
        continue-on-error: true # Falls back to source if no artifact exists yet

      - name: Install Local GCL27 Binary
        if: github.ref_name != 'main'
        run: |
          BOTTLE_FILE=$(ls -1 gcl27*z | head -n 1)
          [ "$BOTTLE_FILE" != "" ] || false
          brew tap-new local/math
          TAP_DIR=$(brew --repository local/math)
          cp ./Formula/gcl27.rb "$TAP_DIR/Formula/gcl27.rb"
          BOTTLE_SHA=$(shasum -a 256 $BOTTLE_FILE | awk '{print $1}')
          cp $BOTTLE_FILE $TAP_DIR/$(echo $BOTTLE_FILE | sed 's,--,-,1')
          cd $TAP_DIR
          cp Formula/gcl27.rb Formula/gcl27.rb.old
          sed -i '' "s@root_url .*@root_url \"file://${TAP_DIR}\"@g" Formula/gcl27.rb
          sed -i '' "s/# sha256 cellar.*/sha256 cellar: :any, arm64_sequoia: \"${BOTTLE_SHA}\"/g" Formula/gcl27.rb
          brew install --formula ./Formula/gcl27.rb

      - name: Build Maxima
        if: github.ref_name == 'maxima'
        run: |
          brew audit --formula "cammgh/math/maxima-gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-from-source "cammgh/math/maxima-gcl"
          brew test --verbose "cammgh/math/maxima-gcl"

      - name: Execute Full Upstream Testsuite (with 30-minute GitHub Timeout)
        timeout-minutes: 30
        run: |
          ./maxima-local -g --lisp=gcl --batch-string="run_testsuite(share_tests=true);"
          false

      - name: Build ACL2 Stack
        if: github.ref_name == 'acl2'
        run: |
          brew audit --formula "cammgh/math/acl2-gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-from-source "cammgh/math/acl2-gcl"
          brew test "cammgh/math/acl2-gcl"

      - name: Build FriCAS Stack
        if: github.ref_name == 'fricas'
        run: |
          brew audit --formula "cammgh/math/fricas-gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-from-source "cammgh/math/fricas-gcl"
          brew test "cammgh/math/fricas-gcl"

      - name: Build HOL88 Stack
        if: github.ref_name == 'hol88'
        run: |
          brew audit --formula "cammgh/math/hol88-gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-from-source "cammgh/math/hol88-gcl"
          brew test "cammgh/math/hol88-gcl"

      - name: Build AXIOM Stack
        if: github.ref_name == 'axiom'
        run: |
          brew audit --formula "cammgh/math/axiom-gcl" --online || echo "Audit failure, continuing"
          brew install --formula --verbose --build-from-source "cammgh/math/axiom-gcl"
          brew test "cammgh/math/axiom-gcl"

      # --- DEB_BUG TRACE ARCHIVE ---
      - name: Open Debug SSH Session on Failure
        if: failure()
        uses: mxschmitt/action-tmate@v3
