name: brew test-bot
on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-bot:
    # Swapped from 'runs-equiv' to the correct 'runs-on' key
    # Mapped to 'macos-latest' to automatically step onto Apple Silicon M-series clusters
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew Framework
        uses: Homebrew/actions/setup-homebrew@master

      - name: Execute Brew Test Bot
        run: brew test-bot --only-formulae
